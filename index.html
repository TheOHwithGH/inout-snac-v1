<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบบันทึกเวลางาน SNAC</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --warning: #ffc107; --purple: #6f42c1; --info: #17a2b8; }
        body { font-family: 'Sarabun', sans-serif; padding: 20px; background: #f0f2f5; position: relative; }
        .btn-back { position: absolute; top: 15px; left: 15px; padding: 8px 15px; background: #fff; border: 1px solid #ccc; border-radius: 20px; text-decoration: none; color: #333; font-size: 14px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .container { max-width: 450px; margin: 45px auto auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; margin-bottom: 20px; color: #1a1a1a; font-size: 22px; font-weight: bold; }
        #camera-box { display: none; margin-bottom: 15px; text-align: center; }
        video { width: 100%; border-radius: 8px; background: #000; }
        canvas { display: none; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; margin-bottom: 10px; transition: 0.2s; }
        .btn-camera { background: var(--primary); color: white; }
        .btn-snap { background: var(--warning); color: #000; }
        .btn-group { display: none; gap: 10px; width: 100%; }
        .btn-in { background: var(--success); color: white; flex: 1; }
        .btn-afternoon { background-color: #2196F3 !important; color: white !important; display: none; }
        .btn-out { background: var(--danger); color: white; flex: 1; }
        .special-group { display: none; flex-direction: column; margin-top: 10px; border-top: 2px dashed #eee; padding-top: 15px; }
        .btn-leave { background: var(--purple); color: white; }
        .btn-absent { background: #6c757d; color: white; }
        .btn-sick { background: var(--info); color: white; }
        #result { display: none; background: #f8f9fa; padding: 15px; border-radius: 8px; margin-bottom: 15px; border-left: 5px solid var(--primary); flex-direction: column; }
        #loader { display: none; text-align: center; color: var(--primary); font-weight: bold; margin-top: 10px; }
        .btn-info-personal { background: #e2e8f0; color: #333; border: 2px solid #ccc; margin-top: 5px; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 999; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-box { background: white; width: 100%; max-width: 420px; border-radius: 16px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .stat-grid { display: flex; flex-wrap: wrap; gap: 8px; margin: 15px 0; }
        .stat-card { background: #f8f9fa; border: 1px solid #e3e6f0; border-radius: 8px; padding: 10px; text-align: center; flex: 1; min-width: 45%; box-sizing: border-box; }
        .stat-num { font-size: 18px; font-weight: bold; display: block; }
        .table-wrap { max-height: 180px; overflow-y: auto; font-size: 14px; border: 1px solid #eee; border-radius: 8px; width: 100%; }
        .modal-btn-group { display: flex; gap: 10px; margin-top: 15px; }
    </style>
</head>

        <h2 style="font-size: 20px; font-weight: bold; color: #1e293b; margin: 0 0 5px 0;">ระบบลงเวลา</h2>
        <p style="font-size: 13px; color: #64748b; margin: 0 0 20px 0;">กรุณากรอกรหัสประจำตัว 4 หลักเพื่อเข้าสู่ระบบ</p>
        
        <input type="text"

        <div id="live-clock" style="text-align: center; font-size: 1.2rem; font-weight: bold; color: #333; background: #f8f9fa; padding: 10px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #e0e0e0;"> </div>
    </div>
    <div style="text-align: center; margin: 10px auto; max-width: 350px; padding: 8px 12px; background: #fff8e1; border: 1px solid #ffe082; border-radius: 8px; color: #b78103; font-weight: bold; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
    ⚠️ กำหนดเข้างานวันนี้: ก่อนเวลา <span id="lateLimitTime" style="font-size: 18px; color: #e65100; font-weight: 900; text-shadow: 1px 1px 2px rgba(0,0,0,0.1);">08:30</span> น.
    </div>

<script>
 // บังคับเด้งออกจากเบราว์เซอร์ของไลน์เข้าเบราว์เซอร์ปกติ
 if (navigator.userAgent.indexOf('Line') > -1) {

<a href="#" class="btn-back" onclick="location.reload();">⬅ ย้อนกลับ</a>

<div class="container" id="main-interface">
    <h2>หจก.แสงอนันต์การไฟฟ้า<br>บันทึกเวลาทำงาน</h2>

    <div style="background: #e2e8f0; padding: 12px; border-radius: 8px; text-align: center; font-weight: bold; margin-bottom: 15px; color: #1e293b;">
        <span id="display-worker-name">👤 กรุณาใส่รหัสล็อกอินด้านบน</span>
    </div>

    <label>ทำรายการ:</label>
    <button class="btn btn-snap" id="start-camera">📷 เปิดกล้องถ่ายรูป</button>
    <button class="btn btn-info-personal" id="get-personal-info" onclick="openPersonalDashboard()">🔎 ข้อมูลบุคคล</button>

    
    <div id="camera-box">
        <video id="video" autoplay playsinline muted></video>
        <button class="btn btn-snap" id="snap">📷 กดเพื่อถ่ายภาพ</button>
    </div>
    <canvas id="canvas"></canvas>
    
    <div id="result">
        <p style="margin:5px 0;"><b>ชื่อ:</b> <span id="res-name"></span></p>
        <p style="margin:5px 0;"><b>เวลา:</b> <span id="res-time"></span></p>
    </div>

    <div class="btn-group" id="btn-group">
        <button class="btn btn-in" onclick="confirmAndSend('In')">เข้างาน</button>
        <button class="btn btn-out" onclick="confirmAndSend('Out')">ออกงาน</button>
        <button class="btn btn-afternoon" id="btn-afternoon" onclick="confirmAndSend('เข้างานบ่าย')">เข้างานบ่าย</button>
    </div>
    <div class="special-group" id="special-group">
        <p style="text-align:center; font-size: 0.85rem; color: #777; margin-bottom: 10px;">-- กรณีอื่นๆ --</p>
        <button class="btn btn-leave" onclick="confirmAndSend('Vacation')">🌴 พักร้อน 1วัน</button>
        <button class="btn btn-absent" onclick="confirmAndSend('Absent')">🚫 ขาดงาน 1วัน</button>
        <button class="btn btn-sick" onclick="confirmAndSend('Sick')">🚀 ป่วย</button>
    </div>
    <div id="loader">⏳ ระบบกำลังบันทึกข้อมูล...</div>
</div>

<div class="modal-overlay" id="common-modal">
    <div class="modal-box" id="modal-content-area"></div>
</div>

<script>
    //  ---------------------------------------------------------------
    // สั่งให้นาฬิกาทำงานทันทีเมื่อเปิดหน้าเว็บ โดยอัปเดตทุก ๆ 1 วินาที (1000ms)
  window.addEventListener("DOMContentLoaded", () => {
    setInterval(() => {
        let now = new Date();
        let dateThai = now.toLocaleDateString('th-TH', { day: 'numeric', month: 'short', year: 'numeric' });
        
        let hours = now.getHours().toString().padStart(2, '0');
        let minutes = now.getMinutes().toString().padStart(2, '0');
        let seconds = now.getSeconds().toString().padStart(2, '0');
        
        document.getElementById("live-clock").innerHTML = "📅 " + dateThai + " | ⏰ " + hours + ":" + minutes + ":" + seconds + " น.";
    }, 1000);
  });
      window.currentLoggedPin = ""; 
     
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx9DPyk5I3Ez_ditnsMFHuSiELyQZtfzWFOjaMhV6J381qKOnUt09VgRnjr3_Rd5g0/exec"; 
    
    const video = document.getElementById('video'), 
          canvas = document.getElementById('canvas'), 
          startBtn = document.getElementById('start-camera'), 
          snapBtn = document.getElementById('snap'), 
          cameraBox = document.getElementById('camera-box');
          
    const modal = document.getElementById('common-modal'), 
          modalArea = document.getElementById('modal-content-area');
    
    window.selectedWorkerName = "";
    let imageDataUrl = "";
    let userGpsLocation = ""; 
    // 🎯 สร้างตัวแปรส่วนกลางรอรับเวลาสายจาก Sheets 
    window.lateLimitTimeFromSheets = "08:30"; 

 function validateEmployeeFcode(el) {
    const statusMsg = document.getElementById('auth-status-msg');
    statusMsg.innerText = ""; 
    el.value = el.value.replace(/[^0-9]/g, '');

    if (el.value.length === 4) {
        const codeValue = el.value;
        el.disabled = true; 
        statusMsg.style.color = "#3b82f6";
        statusMsg.innerText = "⌛ กำลังตรวจสอบรหัสพนักงาน...";
        
        // 🚀 จังหวะตรวจสอบรหัสพนักงาน
        fetch(`${WEB_APP_URL}?action=verifyFcode&passcode=${codeValue}`)
        .then(res => res.json())
        .then(data => {
            if (data.status === "success" || data.status === "success1234") {
                window.currentLoggedPin = codeValue; 
                statusMsg.style.color = "#10b981";
                statusMsg.innerText = "✅ รหัสถูกต้อง กำลังเข้าสู่ระบบ...";
                window.selectedWorkerName = data.name;

                // แกะเวลาสาย M1 แปะโชว์ที่ระบบ
                let timeFromM1 = data.lateLimit || "08:30";
                window.lateLimitTimeFromSheets = timeFromM1;
                let showBox = document.getElementById("lateLimitTime") || document.getElementById("m1Value");
                if (showBox) showBox.innerText = timeFromM1;

                // 🎯 [จังหวะสลับหน้าจอตามรูป]: เข้าหน้าเมนูพนักงาน ปุ่มกดแสตนบายรอหลังฉากทันที
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('display-worker-name').innerText = "👤 ผู้ใช้งาน: " + data.name;

                if (data.status === "success1234") {
                    document.getElementById('btn-group').style.display = 'flex'; 
                    document.getElementById('special-group').style.display = 'flex'; 
                    if (typeof startBtn !== 'undefined') startBtn.style.display = 'none'; 
                } else {
                    document.getElementById('btn-group').style.display = 'none';
                    document.getElementById('special-group').style.display = 'none';
                    if (typeof startBtn !== 'undefined') startBtn.style.display = 'block';
                }

                let delayTime = 400; // เวลาหน่วงกรณีมาลงเวลาครั้งแรกของวัน

                // 🔍 ตรวจเงื่อนไขสั้น ๆ: ถ้าวันนี้เคยลงเวลาเข้างานไปแล้ว (คอลัมน์ D มีค่าส่งมาจากหลังบ้าน)
                if (data.alreadyInTime && data.alreadyInTime !== "") {
                    
                    let cleanIn = data.alreadyInTime;
                    let cleanOut = data.alreadyOutTime || "--:--"; // ถ้ายังไม่กดออกงาน ให้ขึ้นขีดแทน
                    
                    // เสกหน้าต่างลอยโปร่งแสง (Overlay) โดยที่ปุ่มจริงตามรูปยังคงเห็นได้ลาง ๆ ด้านหลัง
                    let overlayHTML = `
                        <div id="transparent-popup-overlay" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.4); z-index: 9999; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(3px);">
                            <div style="background-color: rgba(255, 255, 255, 0.98); color: #1e40af; padding: 25px; border-radius: 16px; text-align: center; border: 2px solid #3b82f6; width: 85%; max-width: 340px; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3); animation: popScale 0.3s ease-out;">
                                <div style="font-size: 26px; margin-bottom: 5px;">📣</div>
                                <div style="font-size: 18px; font-weight: bold; margin-bottom: 15px; color: #1e3a8a;">บันทึกเวลาของวันนี้</div>
                                
                                <div style="display: flex; justify-content: space-between; background: #f8fafc; padding: 15px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 15px;">
                                    <div style="flex: 1; border-right: 1px solid #e2e8f0; padding-right: 5px;">
                                        <div style="font-size: 13px; color: #64748b; font-weight: bold;">💵 เข้างาน</div>
                                        <div style="color: #10b981; font-size: 22px; font-weight: 800; margin-top: 5px;">${cleanIn}</div>
                                    </div>
                                    <div style="flex: 1; padding-left: 5px;">
                                        <div style="font-size: 13px; color: #64748b; font-weight: bold;">⛔ ออกงาน</div>
                                        <div style="color: ${cleanOut === '--:--' ? '#94a3b8' : '#ef4444'}; font-size: 22px; font-weight: 800; margin-top: 5px;">${cleanOut}</div>
                                    </div>
                                </div>
                                <div style="font-size: 12px; color: #6b7280; letter-spacing: 0.5px;">(สุข ทุกข์ เวียนวนกันไป)</div>
                            </div>
                        </div>
                        <style>@keyframes popScale { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }</style>
                    `;
                    
                    document.body.insertAdjacentHTML('beforeend', overlayHTML);
                    delayTime = 6000; // ⏳ เปลี่ยนเวลาล็อกหน้าจอไว้ 3 วินาที
                }

                // 3. ปลดล็อกหน้าต่างเมื่อครบเวลา
                setTimeout(() => {
                    const transparentOverlay = document.getElementById('transparent-popup-overlay');
                    if (transparentOverlay) transparentOverlay.remove(); // สลายหน้าต่างลอย เพื่อให้กดปุ่มเหลืองถ่ายรูปหลังจอได้

                    if (navigator.geolocation) {
                        navigator.geolocation.getCurrentPosition(pos => {
                            window.userGpsLocation = pos.coords.latitude + "," + pos.coords.longitude;
                        }, err => { window.userGpsLocation = "ไม่ได้เปิดพิกัด"; });
                    }
                }, delayTime);

            } else {
                statusMsg.style.color = "#ef4444";
                statusMsg.innerText = data.message || "❌ รหัสไม่ถูกต้อง";
                el.value = ""; el.disabled = false; el.focus();
            }
        })
        .catch(err => {
            statusMsg.style.color = "#ef4444";
            statusMsg.innerText = "❌ เกิดข้อผิดพลาด กรุณาลองใหม่";
            el.disabled = false; el.value = ""; el.focus();
        });
     }
}


    // 📸 การทำงานปุ่มเปิดกล้องถ่ายรูป
    startBtn.onclick = async () => {
        if (!window.selectedWorkerName) return alert("ระบบไม่พบชื่อผู้ใช้งาน");
        try {
            let idealCamera = "user"; 
            const constraints = { 
                video: { facingMode: { ideal: idealCamera }, width: { ideal: 640 }, height: { ideal: 480 } }, 
                audio: false 
            };
            let stream;
            try { 
                stream = await navigator.mediaDevices.getUserMedia(constraints); 
            } catch (e) { 
                stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: false }); 
            }
            video.srcObject = stream;
            await video.play(); 
            cameraBox.style.display = 'block';
            startBtn.style.display = 'none';
        } catch (err) { 
            alert("กล้องขัดข้อง: " + err.message); 
        }
    };

    // 📸 ปุ่มกด Snap ล็อกพิกัด และภาพถ่าย
    snapBtn.onclick = () => {
        canvas.width = video.videoWidth; 
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        imageDataUrl = canvas.toDataURL('image/jpeg'); 
        
        document.getElementById('res-name').innerText = window.selectedWorkerName;
        document.getElementById('res-time').innerText = new Date().toLocaleTimeString('th-TH');
        document.getElementById('result').style.display = 'flex';
        cameraBox.style.display = 'none';
        
        document.getElementById('btn-group').style.display = 'flex';
        document.getElementById('special-group').style.display = 'flex';
        
        if(video.srcObject) { video.srcObject.getTracks().forEach(track => track.stop()); }
    };

    // 🎯 ระบบคำนวณและกางหน้าต่างยืนยัน (Modal) ป้องกันพนักงานกดผิด
    // (เรียกใช้ค่าเวลาแปรผันตาม M1 จากหน้าบ้านตรง ๆ ไม่สับสน)
    function confirmAndSend(status) {
        if (!window.selectedWorkerName) return alert("ไม่พบข้อมูลพนักงาน");

        if (status === 'In') {
            let now = new Date();
            let currentMinutes = (now.getHours() * 60) + now.getMinutes();
            
            let hh = 8;
            let mm = 30; // ค่าเริ่มต้นแบคอัพคือ 08:30 น.

            // 🛠️ ดึงค่าเวลาสายที่บราวเซอร์จำไว้จาก M1 (เช่น "08:30" หรือเวลารูปแบบอื่น)
            let m1Time = window.lateLimitTimeFromSheets;
            if (m1Time && m1Time.indexOf(":") !== -1) {
                let parts = m1Time.split(":");
                hh = parseInt(parts[0], 10);
                mm = parseInt(parts[1], 10);
            }

            let limitMinutes = (hh * 60) + mm; 

            if (currentMinutes > limitMinutes) { 
                status = 'Late'; 
            }
        }

        if (status === 'Out') {
            let now = new Date();
            if (now.getHours() < 13) {
                return alert("🛑 ยังไม่ถึงเวลาเลิกงาน! ปุ่มออกงานจะเปิดให้ใช้งานหลังเวลา 13:00 น. เป็นต้นไปครับ");
            }
        }

        const labels = { 
            'In': 'เข้างานปกติ', 'Late': 'เข้างานสาย ⚠️', 'เข้างานบ่าย': 'เข้างานบ่าย', 
            'Out': 'ออกงาน', 'Vacation': 'พักร้อน 1วัน', 'VacationHalf': 'พักร้อน 1/2 วัน', 
            'Absent': 'ขาดงาน 1วัน', 'Sick': 'ป่วย' 
        };
        let currentTimeText = new Date().toLocaleTimeString('th-TH');
        let btnHtml = `
            <div style="display: flex; flex-direction: column; gap: 8px; width: 100%;">
                <button class="btn" style="background:#10b981; color:white; padding:12px; border-radius:8px; font-weight:bold; margin-bottom:0;" onclick="sendToSheet('${status}')">บันทึก ${labels[status]}</button>
                <button class="btn" style="background:#64748b; color:white; padding:12px; border-radius:8px; font-weight:bold; margin-bottom:0;" onclick="closeModal()">❌ ยกเลิก</button>
            </div>
        `;
        if (status === 'Late') {
            btnHtml = `
                <div style="display: flex; flex-direction: column; gap: 8px; width: 100%;">
                    <button class="btn" style="background:#ef4444; color:white; padding:12px; border-radius:8px; font-weight:bold; margin-bottom:0;" onclick="sendToSheet('Late')">⚠️ ยืนยันเข้างานสาย</button>
                    <button class="btn" style="background:#8b5cf6; color:white; padding:12px; border-radius:8px; font-weight:bold; margin-bottom:0;" onclick="closeModal(); confirmAndSend('VacationHalf');">🌗 เปลี่ยนเป็นลาพักร้อน 1/2 วัน</button>
                    <button class="btn" style="background:#64748b; color:white; padding:12px; border-radius:8px; font-weight:bold; margin-bottom:0;" onclick="closeModal()">❌ ยกเลิก</button>
                </div>
            `; // 💡 ปรับปุ่มยกเลิกของสายเป็น closeModal() หน้าจอจะได้ไม่กระตุกครับ
        }

        modalArea.innerHTML = `
            <h3 style="margin-top:0; color:#1e293b; text-align:center;">ยืนยันข้อมูลลงเวลา</h3>
            <p style="margin:6px 0;"><b>👤 พนักงาน:</b> ${window.selectedWorkerName}</p>
            <p style="margin:6px 0;"><b>📌 Status:</b> <span style="color:#3b82f6; font-weight:bold;">${labels[status]}</span></p>
            <p style="margin:6px 0; margin-bottom:20px;"><b>⏰ เวลาปัจจุบัน:</b> ${currentTimeText}</p>
            ${btnHtml}
        `;
        modal.style.display = 'flex';
    }

    function closeModal() { modal.style.display = 'none'; }	

    // 🚀 ฟังก์ชันเด็ดขาด ส่งข้อมูลพุ่งตรงไปยังหลังบ้าน Google Sheets เช็กกฎเหล็ก
    function sendToSheet(status) {
        const modalArea = document.getElementById('modal-content-area');
        if (modalArea) {
            modalArea.innerHTML = `
                <div style="text-align:center; padding: 20px 10px;">
                    <h3 style="margin-top:0; color:#3b82f6; font-size: 20px;">กำลังตรวจสอบเงื่อนไข...</h3>
                    <p style="color:#475569; margin:4px 0; font-size: 15px;">ระบบกำลังเช็คกฎการบันทึกเวลา</p>
                </div>
            `;
        }
        let now = new Date();
        let timeStr = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        
        // 🎯 [แก้ไขจุดสำคัญ] ไม่ว่าจะสถานะไหน (รวมถึง ลาพักร้อน ขาดงาน ป่วย) ก็จะดึงค่า GPS ส่งไปด้วยเสมอ
        let gpsData = window.userGpsLocation || "ไม่ได้เปิดพิกัด";
        let finalImg = imageDataUrl || "";

        let payload = {
            name: window.selectedWorkerName,
            status: status,
            time: timeStr,   
            gps: gpsData, // ส่งพิกัด GPS
            image: finalImg
        };

        fetch(WEB_APP_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain" },
            body: JSON.stringify(payload)
        })
        .then(response => response.text())
        .then(textData => {
            let data = JSON.parse(textData);
            if (data.status === "success") {
                if (modalArea) {
                    modalArea.innerHTML = `
                        <div style="text-align:center; padding: 20px 10px;">
                            <div style="font-size: 45px; color: #10b981; margin-bottom: 10px;">🎉</div>
                            <h3 style="margin-top:0; color:#10b981; font-size: 20px;">บันทึกข้อมูลสำเร็จ!</h3>
                            <div style="background:#f1f5f9; padding:10px; border-radius:8px; margin-top:15px;">
                                <p style="margin:0; font-size: 14px; color:#64748b;">ค่าเวลาปัจจุบัน</p>
                                <p style="margin:0; font-weight:bold; color:#1e293b; font-size: 18px;">web.time = "${timeStr}"</p>
                            </div>
                        </div>
                    `;
                }
                setTimeout(() => { location.reload(); }, 3000);
          } else {
                if (modalArea) {
                    modalArea.innerHTML = `
                        <div style="text-align:center; padding: 20px 10px;">
                            <div style="font-size: 45px; color: #ef4444; margin-bottom: 10px;">❌</div>
                            <h3 style="margin-top:0; color:#ef4444; font-size: 18px;">บันทึกไม่สำเร็จ!</h3>
                            <p style="color:#1e293b; font-weight:bold; margin:10px 0; font-size: 15px;">${data.message}</p>
                            <p style="color:#64748b; font-size: 13px;">(ระบบปฏิเสธการลงเวลาเนื่องจากผิดเงื่อนไข)</p>
                        </div>
                    `;
                }
                setTimeout(() => { location.reload(); }, 3000);
            }
        })
        .catch(err => {
            console.error("Error:", err);
            alert("❌ การเชื่อมต่อขัดข้อง กรุณาลองใหมี่อีกครั้ง");
            location.reload();
        });
    }


 // 📊 ฟังก์ชันดึงประวัติข้อมูลบุคคล (เวอร์ชันแก้ไขสมบูรณ์)
function openPersonalDashboard() {
    if (!window.selectedWorkerName) {
        return alert("ระบบไม่พบข้อมูลการยืนยันตัวตน กรุณารีเฟรชหน้าจอใหม่");
    }

    // 💡 ค้นหาและเตรียมพื้นที่ Modal
    let modalElement = document.getElementById("modal");
    let modalAreaElement = document.getElementById("modalArea");
    
    // เคสป้องกันหากเขียนชื่อตัวแปรไม่ตรงกับ ID ใน HTML
    if (!modalElement || !modalAreaElement) {
        modalElement = modal; // fallback ใช้ตัวแปร Global
        modalAreaElement = modalArea;
    }

    modalAreaElement.innerHTML = `<div style="text-align:center; padding: 20px;">⏳ กำลังดึงสถิติสะสมของ คุณ ${window.selectedWorkerName}...</div>`;
    modalElement.style.display = "flex";

    let getSummaryUrl = `${WEB_APP_URL}?action=getEmployeeSummary&name=${encodeURIComponent(window.selectedWorkerName)}`;
    
    fetch(getSummaryUrl)
    .then(res => res.json())
    .then(data => {
        if (data.status === "success" && data.dashboard) {
            let db = data.dashboard;
            let rowsHtml = "";
            
            if (data.logs && data.logs.length > 0) {
                data.logs.forEach(log => {
                    if (!log.date) return;
                    let dateStr = log.date.toString().trim();
                    if (dateStr.includes("T")) {
                        dateStr = dateStr.split("T")[0];
                    }

                    // 💡 แก้ไข: ดักจับทั้ง ลาเต็มวัน (1) และลาครึ่งวัน (0.5 หรือ -0.5)
                    let vVal = Number(log.vacation) || 0;
                    let vacationCell = (vVal === 1 || vVal === 0.5 || vVal === -0.5) ? "📌" : "-";
                    
                    let absentCell = Number(log.absent) >= 1 ? "🅾" : "-";
                    let sickCell = Number(log.sick) >= 1 ? "👾" : "-";
                    
                    let wVal = Number(log.work) || 0;
                    let workCell = (wVal === 1 || wVal === 0.5) ? "✔️" : "-";

                    rowsHtml += `
                        <tr style="border-bottom: 1px solid #eee;"> 
                            <td style="padding:6px; color:#333; font-size: 12px; font-weight: bold;">${dateStr}</td>
                            <td style="padding:6px; font-size: 12px;">${vacationCell}</td>
                            <td style="padding:6px; font-size: 12px;">${absentCell}</td>
                            <td style="padding:6px; font-size: 12px;">${sickCell}</td>
                            <td style="padding:6px; font-size: 12px;">${workCell}</td>
                        </tr>
                    `;
                });
            }
            
            if (rowsHtml === "") {
                rowsHtml = `<tr><td colspan="5" style="padding:15px; color:#999; font-size: 12px;">ยังไม่มีประวัติการบันทึกในเดือนนี้</td></tr>`;
            }

            modalAreaElement.innerHTML = `
                <h3 style="font-size:18px;font-weight:bold;color:var(--success);text-align:center;margin-bottom:10px;">📊 ข้อมูลบุคคล</h3>
                <p style="margin:5px 0;font-size:15px;"><b>👤 ชื่อ:</b> ${db.name}</p>
                
                <div style="background:#fff9db;padding:10px;border-radius:6px;font-size:14px;font-weight:bold;color:#b45309;border-left:4px solid #f59e0b;margin-bottom:10px;text-align:center;">
                    🌴 พักร้อนคงเหลือ ${db.remainingVacation || 0} วัน
                </div>

                <div style="background:#e7f1ff;padding:8px;border-radius:6px;font-size:13px;border-left:4px solid var(--primary);margin-bottom:10px;">
                    <b>ℹ️ หมายเหตุ: ข้อมูลจะเป็นปัจจุบัน หลัง20.00น</b>
                </div>
                
                <div class="stat-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
                
                  <div class="stat-card" style="background:#f8f9fa; padding:10px; border-radius:6px; text-align:center; border:1px solid #eee;"><span style="font-size:11px;color:#666;display:block;">งาน</span><span class="stat-num"style="font-size:18px; font-weight:bold; color:#28a745;">${db.sumwork || 0}</span></div>
                   
                  <div class="stat-card" style="background:#f8f9fa; padding:10px; border-radius:6px; text-align:center; border:1px solid #eee;"><span style="font-size:11px;color:#666;display:block;"> พักร้อน</span><span class="stat-num"style="font-size:18px; font-weight:bold;color:#17a2b8;">${db.vacation || 0}</span></div>
                
                  <div class="stat-card" style="background:#f8f9fa; padding:10px; border-radius:6px; text-align:center; border:1px solid #eee;"><span style="font-size:11px;color:#666;display:block;">ขาดงาน</span><span class="stat-num" style="font-size:18px; font-weight:bold; color:#17a2b8;">${db.absent || 0}</span></div>
                
                  <div class="stat-card" style="background:#f8f9fa; padding:10px; border-radius:6px; text-align:center; border:1px solid #eee;"><span style="font-size:11px;color:#666;display:block;">ป่วย</span><span class="stat-num" style="font-size:18px; font-weight:bold; color:#17a2b8;">${db.sick || 0}</span></div>

                </div>
                
                <p style="font-weight:bold;font-size:13px;margin:5px 0;">📅 ประวัติย้อนหลัง-ประจำเดือน:</p>
                
                <div class="table-wrap" style="max-height: 200px; overflow-y: auto; border: 1px solid #ddd; border-radius: 8px;"> 
                    <table style="width:100%; text-align:center; border-collapse:collapse;">
                        <thead style="background:#f1f1f1; position:sticky; top:0; z-index: 10;">
                            <tr>
                                <th style="padding: 8px; font-size: 12px; border-bottom: 1px solid #ddd;">วันที่</th>
                                <th style="padding: 8px; font-size: 12px; border-bottom: 1px solid #ddd;">ลา</th>
                                <th style="padding: 8px; font-size: 12px; border-bottom: 1px solid #ddd;">ขาด</th>
                                <th style="padding: 8px; font-size: 12px; border-bottom: 1px solid #ddd;">ป่วย</th>
                                <th style="padding: 8px; font-size: 12px; border-bottom: 1px solid #ddd;">งาน</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${rowsHtml}
                        </tbody>
                    </table>
                </div>
                <button class="btn" style="width:100%;border:none;padding:12px;border-radius:8px;font-weight:bold;margin-top:12px;background:#333;color:#fff;cursor:pointer;font-size: 15px;" onclick="closeModal()">🔒 ปิดหน้านี้</button>
            `;
        } else {
            modalAreaElement.innerHTML = `<div style="text-align:center; padding:20px; color:red;">❌ ไม่พบข้อมูลสถิติในระบบ หรือไฟล์ตารางยังไม่ได้ประมวลผล</div>
            <button class="btn" style="background:#6c757d; color:white; margin-top:10px; padding:10px; border-radius:8px; width:100%; border:none; cursor:pointer;" onclick="closeModal()">ปิดหน้าต่าง</button>`;
        }
    })
    .catch(err => {
        console.error("Dashboard Error:", err);
        modalAreaElement.innerHTML = `<div style="text-align:center; padding:20px; color:red;">❌ เกิดข้อผิดพลาดทางเทคนิคในการดึงข้อมูล</div>
        <button class="btn" style="background:#6c757d; color:white; margin-top:10px; padding:10px; border-radius:8px; width:100%; border:none; cursor:pointer;" onclick="closeModal()">ปิดหน้าต่าง</button>`;
    });
}

    // ฟังก์ชันเปิด-ปิดปุ่มเข้างานบ่ายตามช่วงเวลา
    function checkButtonDisplay() {
        let now = new Date();
        let totalMinutes = (now.getHours() * 60) + now.getMinutes();
        let switchTime = (11 * 60) + 30; 
        let afternoonBtn = document.getElementById('btn-afternoon'); 
        if (afternoonBtn) {
            if (totalMinutes >= switchTime) afternoonBtn.style.setProperty('display', 'block', 'important'); 
            else afternoonBtn.style.setProperty('display', 'none', 'important');  
        }
    }
    setInterval(checkButtonDisplay, 1000); //นับเวลาให้ปุ่มทำงาน ทุก1วิ
</script>
</body>
</html>
